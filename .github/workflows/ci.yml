name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile
        run: python -m compileall hyper_cli tests

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: CLI smoke checks
        run: |
          hyper --help
          hyper spot --help
          hyper spot market-buy --help
          hyper perp --help
          hyper perp market-open --help
          hyper perp modify --help
          hyper book --help
          hyper prices --help
          hyper feed strategy --help
